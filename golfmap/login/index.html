<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GolfMAP — redirection</title>
  <script>
    (function () {
      var path = window.location.pathname;
      var qs = window.location.search || '';
      var base = path.replace(/\/?login\/?$/i, '/');
      if (!base.endsWith('/')) base += '/';
      window.location.replace(base + '#/login' + qs);
    })();
  </script>
</head>
<body><p>Redirection vers la page de connexion…</p></body>
</html>
