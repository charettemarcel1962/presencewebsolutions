<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Malika Studio</title>
  <style>
    html {
      margin: 0;
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: 100svh;
      position: relative;
      overflow: hidden;
    }
    .page-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      min-height: 100%;
      min-height: -webkit-fill-available;
      z-index: 0;
      background-color: #050a14;
      background-image: url("Images/background.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      pointer-events: none;
    }
    .logo-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: clamp(14px, 3.5vw, 32px);
      padding: 12px 16px calc(14px + env(safe-area-inset-bottom, 0px));
      box-sizing: border-box;
      pointer-events: auto;
    }
    .logo-dock a {
      display: block;
      line-height: 0;
      text-decoration: none;
      transition: transform 0.25s ease, filter 0.25s ease;
    }
    .logo-dock a:hover {
      transform: translateY(-4px);
      filter: brightness(1.1);
    }
    .logo-dock a:focus-visible {
      outline: 2px solid rgba(255, 215, 120, 0.8);
      outline-offset: 4px;
      border-radius: 8px;
    }
    .logo-dock img {
      height: clamp(48px, 9vw, 84px);
      width: auto;
      max-width: min(150px, 24vw);
      object-fit: contain;
      vertical-align: middle;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.35));
    }
    .logo-dock a[href="site/index.html"] img {
      filter: none;
    }
    .logo-dock a[href="site/index.html"]:hover {
      transform: none;
      filter: none;
    }
  </style>
</head>
<body>
  <div class="page-bg" role="presentation" aria-hidden="true"></div>
  <nav class="logo-dock" aria-label="Plateformes">
    <a href="site/index.html" target="_blank" rel="noopener noreferrer">
      <img src="Images/malikafit.png" alt="Malika Fit" width="200" height="120" />
    </a>
    <a href="crm/malikafit.html" target="_blank" rel="noopener noreferrer">
      <img src="Images/crm.png" alt="CRM" width="200" height="120" />
    </a>
    <a href="https://login.doterra.com/sign-in?gig_ui_locales=fr-CA&amp;gig_client_id=RzFgRmPlegftl8RXu2awVaGy" target="_blank" rel="noopener noreferrer">
      <img src="Images/doterra.png" alt="dōTERRA" width="200" height="120" />
    </a>
    <a href="pws/index.html" target="_blank" rel="noopener noreferrer">
      <img src="Images/pws.png" alt="PWS — Présence Web Solutions" width="200" height="120" />
    </a>
  </nav>
</body>
</html>
